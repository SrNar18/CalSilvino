<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú | Cal Silvino</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <img src="/images/logo.png" class="logo">

        <nav>
            <a href="#">Inicio</a>
            <a href="#" class="active">Menú</a>
            <a href="#" class="btn">Contacto</a>
        </nav>
    </header>

    <main>
    <section class="menu-section">
        <div class="menu-header">
            <h1 class="menu-title">Nuestro Menú</h1>
        </div>

        <div class="menu-cards">

            <!-- CARTA ESPAÑOL / CATALÀ -->
            <a href="pdfs/carta-es-ca.pdf" target="_blank" class="menu-img-link">
                <img src="/images/MenuCatEsp.png" alt="Descargar carta Español / Català" class="menu-img">
            </a>

            <!-- CARTA FRANÇAIS / ENGLISH -->
            <a href="pdfs/carta-fr-en.pdf" target="_blank" class="menu-img-link">

</main>

    <footer>
        <div class="footer-left">
            <img src="/images/logo.png" class="footer-logo">

            <div class="footer-info">
                <p>Av. el Través, 21, AD400 La Massana</p>
                <p>Telèfon: +376 840 720</p>
                <p>info@restaurantcalsilvino.com</p>
            </div>
        </div>

        <div class="footer-right">
            <div class="footer-schedule">
                <div class="schedule-block">
                    <p><strong>Dilluns i dimarts</strong></p>
                    <p>Tancat</p>
                </div>

                <div class="schedule-block">
                    <p><strong>Dimecres, dijous i divendres</strong></p>
                    <p>10.00 - 16.00</p>
                    <p>20.00 - 23.00</p>
                </div>

                <div class="schedule-block">
                    <p><strong>Dissabte, diumenge i festius</strong></p>
                    <p>11.00 - 16.30</p>
                    <p>20.00 - 23.30</p>
                </div>
            </div>
        </div>

    <script src="script.js"></script>
